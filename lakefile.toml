name = "MechProof"
version = "0.1.0"
defaultTargets = ["mechproof", "verify_finger", "verify_tendon", "verify_hand", "verify_arm", "verify_legs", "verify_walking", "verify_capture", "verify_energy", "verify_subsea", "verify_env_matrix", "verify_heavy", "verify_safety"]

[[lean_lib]]
name = "MechProof"

# Tests/ holds one Lean source per `verify_*` executable + a Main.lean.
# Each is its own `lean_exe.root` (e.g. `Tests.VerifyHand`), so we don't
# need an explicit Tests library declaration — Lake discovers them via
# the exe roots.

[[lean_exe]]
name = "mechproof"
root = "Tests.Main"

[[lean_exe]]
name = "verify_finger"
root = "Tests.VerifyFinger"

[[lean_exe]]
name = "verify_tendon"
root = "Tests.VerifyTendon"

[[lean_exe]]
name = "verify_hand"
root = "Tests.VerifyHand"

[[lean_exe]]
name = "verify_arm"
root = "Tests.VerifyArm"

[[lean_exe]]
name = "verify_legs"
root = "Tests.VerifyLegs"

[[lean_exe]]
name = "verify_walking"
root = "Tests.VerifyWalking"

[[lean_exe]]
name = "verify_capture"
root = "Tests.VerifyCapture"

[[lean_exe]]
name = "verify_energy"
root = "Tests.VerifyEnergy"

[[lean_exe]]
name = "verify_subsea"
root = "Tests.VerifySubsea"

[[lean_exe]]
name = "verify_env_matrix"
root = "Tests.VerifyEnvMatrix"

[[lean_exe]]
name = "verify_heavy"
root = "Tests.VerifyHeavy"

[[lean_exe]]
name = "verify_safety"
root = "Tests.VerifySafety"
